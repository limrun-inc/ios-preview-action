name: 'Preview Links on PRs for iOS apps'
description: 'Build iOS apps on Limrun Xcode and post preview links on pull requests'
inputs:
  project-path:
    description: 'Path to the iOS project directory to sync to the Xcode instance. Default is the repository root. A Bazel workspace root here (MODULE.bazel / WORKSPACE) is built with remote build execution instead of xcodebuild; that needs bazelisk on the runner.'
    required: false
    default: '.'
  bazel-target:
    description: 'Bazel label of the app target to build (e.g. //App). Default is inferred when the workspace has a single app target.'
    required: false
    default: ''
  project:
    description: 'Path to the iOS project file to build. Default is derived from the workspace file.'
    required: false
    default: ''
  workspace:
    description: 'Path to the iOS workspace file to build. Default is derived from the project file.'
    required: false
    default: ''
  scheme:
    description: 'The scheme to build. Default is derived from the project file.'
    required: false
    default: ''
  sdk:
    description: 'The SDK to build. Default is "iphonesimulator".'
    required: false
    default: 'iphonesimulator'
  model:
    description: 'The iOS simulator model to use for previews. Supported values: "iphone" or "ipad".'
    required: false
    default: 'iphone'
  build-settings:
    description: 'Newline-delimited KEY=VALUE Xcode build settings for the preview build. Allowed keys are a server-maintained allowlist of safe settings (currently SWIFT_ACTIVE_COMPILATION_CONDITIONS) plus any APP_CONFIG_* key. Use $(inherited) to append, e.g. SWIFT_ACTIVE_COMPILATION_CONDITIONS=$(inherited) LIMRUN.'
    required: false
    default: ''
  api-key:
    description: 'Limrun API key (store as a repository secret)'
    required: true
  github-token:
    description: 'GitHub token for posting PR comments'
    required: false
    default: ${{ github.token }}
outputs:
  preview-url:
    description: 'The preview URL for the uploaded asset'
  asset-id:
    description: 'The Limrun asset ID'
  asset-name:
    description: 'The resolved asset name'
branding:
  icon: 'smartphone'
  color: 'blue'
runs:
  using: 'node24'
  main: 'dist/index.js'
  post: 'dist/index.js'
  post-if: 'always()'
